name: release

# On a GitHub release, build the CLI as a static aarch64-musl binary (runs as-is
# on postmarketOS/Alpine — no toolchain, no glibc) and attach it. The GUI ships
# as a Flatpak (see the `flatpak` workflow / Flathub); the privileged part is
# usb-signaller (built from its own repo).

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  cli:
    name: CLI (aarch64-musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build static CLI
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --release --target aarch64-unknown-linux-musl \
            --package bootdrive-cli --bin bootdrive
      - name: Package
        run: |
          cd target/aarch64-unknown-linux-musl/release
          tar -czf "$GITHUB_WORKSPACE/bootdrive-cli-aarch64-musl.tar.gz" bootdrive
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: bootdrive-cli-aarch64-musl.tar.gz
