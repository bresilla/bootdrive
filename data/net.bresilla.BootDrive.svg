<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- BootDrive app icon: a smartphone turned into a bootable USB drive.
       The USB flash drive is adapted from GNOME Circle's "Impression"
       (io.gitlab.adhami3310.Impression), recoloured orange -> teal. -->
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a4a6b"/>
      <stop offset="1" stop-color="#1b2236"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#50504e"/>
      <stop offset="0.5" stop-color="#2b2b2b"/>
      <stop offset="1" stop-color="#141414"/>
    </linearGradient>

    <!-- USB body side-shading (teal) -->
    <linearGradient id="c" gradientUnits="userSpaceOnUse" x1="3.00001" x2="47.00001" y1="70" y2="70">
      <stop offset="0" stop-color="#0a5560"/>
      <stop offset="0.0909091" stop-color="#22bdd4"/>
      <stop offset="0.181818" stop-color="#148ea0"/>
      <stop offset="0.818182" stop-color="#148ea0"/>
      <stop offset="0.909091" stop-color="#22bdd4"/>
      <stop offset="1" stop-color="#0a5560"/>
    </linearGradient>
    <!-- Metal connector (unchanged, silver) -->
    <linearGradient id="d" gradientTransform="matrix(1.25 0 0 1.222225 -15 -41.33362)" gradientUnits="userSpaceOnUse" x1="20" x2="44" y1="122.999893" y2="122.999893">
      <stop offset="0" stop-color="#adadaa"/>
      <stop offset="0.0833333" stop-color="#d7d6d5"/>
      <stop offset="0.166667" stop-color="#afafab"/>
      <stop offset="0.654803" stop-color="#b8b8b4"/>
      <stop offset="0.938916" stop-color="#a3a29f"/>
      <stop offset="1" stop-color="#8d8b88"/>
    </linearGradient>
    <linearGradient id="e" gradientTransform="matrix(1.25 0 0 1.125003 -14.99999 -28.500411)" gradientUnits="userSpaceOnUse" x1="19.500002" x2="44.5" y1="128.000015" y2="128.000015">
      <stop offset="0" stop-color="#e0e0e0"/>
      <stop offset="1" stop-color="#d1ccc5"/>
    </linearGradient>
    <linearGradient id="f" gradientTransform="matrix(1.166667 0 0 0.875001 -12.33333 3.49984)" gradientUnits="userSpaceOnUse" x1="19.500002" x2="44.5" y1="128.000015" y2="128.000015">
      <stop offset="0" stop-color="#545251"/>
      <stop offset="0.471382" stop-color="#7d7c7a"/>
      <stop offset="1" stop-color="#908e8d"/>
    </linearGradient>
    <!-- Top glow (teal) -->
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="3.00001" x2="47.00001" y1="91" y2="91">
      <stop offset="0" stop-color="#35ccdf" stop-opacity="0.152941"/>
      <stop offset="0.185933" stop-color="#26c2d6" stop-opacity="0.341176"/>
      <stop offset="1" stop-color="#45d4e6" stop-opacity="0.137255"/>
    </linearGradient>
  </defs>

  <!-- Smartphone (back, tilted left, ~10% wider) -->
  <g transform="rotate(-9 46 64)">
    <rect x="14" y="6" width="64" height="118" rx="15" fill="#0e0e0e"/>
    <rect x="14" y="6" width="64" height="118" rx="15" fill="url(#frame)"/>
    <rect x="19" y="12" width="54" height="106" rx="9" fill="url(#screen)"/>
    <path d="M22 16 h50 v12 l-50 30 z" fill="#ffffff" opacity="0.07"/>
    <rect x="40" y="8.5" width="12" height="2" rx="1" fill="#2b2b2b"/>
  </g>

  <!-- USB flash drive (front, right) — Impression's drive, recoloured teal -->
  <g transform="translate(60 0)">
    <path d="m 11 32 h 28 c 4.417969 0 8 3.582031 8 8 v 60 c 0 4.417969 -3.582031 8 -8 8 h -28 c -4.417969 0 -8 -3.582031 -8 -8 v -60 c 0 -4.417969 3.582031 -8 8 -8 z m 0 0" fill="url(#c)"/>
    <path d="m 11 14 h 28 c 4.417969 0 8 3.582031 8 8 v 64 c 0 4.417969 -3.582031 8 -8 8 h -28 c -4.417969 0 -8 -3.582031 -8 -8 v -64 c 0 -4.417969 3.582031 -8 8 -8 z m 0 0" fill="#16a6bd"/>
    <path d="m 15 98 h 20 c 2.761719 0 5 2.6875 5 6 v 10 c 0 3.3125 -2.238281 6 -5 6 h -20 c -2.761719 0 -5 -2.6875 -5 -6 v -10 c 0 -3.3125 2.238281 -6 5 -6 z m 0 0" fill="url(#d)"/>
    <path d="m 14.5 111 h 21 c 2.484375 0 4.5 2.015625 4.5 4.5 s -2.015625 4.5 -4.5 4.5 h -21 c -2.484375 0 -4.5 -2.015625 -4.5 -4.5 s 2.015625 -4.5 4.5 -4.5 z m 0 0" fill="url(#e)"/>
    <path d="m 14.5 112 h 21 c 1.933594 0 3.5 1.566406 3.5 3.5 s -1.566406 3.5 -3.5 3.5 h -21 c -1.933594 0 -3.5 -1.566406 -3.5 -3.5 s 1.566406 -3.5 3.5 -3.5 z m 0 0" fill="url(#f)"/>
    <path d="m 25.992188 38 h -2 l -4 8 h 3 v 10 h -6 v -2.539062 c 1.234374 -0.71875 2 -2.03125 2 -3.460938 c 0 -2.210938 -1.789063 -4 -4 -4 c -2.210938 0 -4 1.789062 -4 4 c 0 1.429688 0.765624 2.75 2 3.460938 v 2.539062 c 0 4 4 4 4 4 h 6 v 2.539062 c -1.234376 0.71875 -2 2.03125 -2 3.460938 c 0 2.210938 1.789062 4 4 4 c 2.210937 0 4 -1.789062 4 -4 c 0 -1.429688 -0.765626 -2.75 -2 -3.460938 v -2.539062 h 6 s 4 0 4 -4 v -2 s 2.25 -0.375 2 -2 v -4 c 0.25 -2.25 -2 -2 -2 -2 h -4 c -2.125 0 -2 2 -2 2 v 4 c 0 2 2 2 2 2 v 2 h -6 v -10 h 3 z m 0 0" fill="#0b6f7d"/>
    <path d="m 3 86 v 2 c 0 4.433594 3.566406 8 8 8 h 28 c 4.433594 0 8 -3.566406 8 -8 v -2 c 0 4.433594 -3.566406 8 -8 8 h -28 c -4.433594 0 -8 -3.566406 -8 -8 z m 0 0" fill="url(#g)"/>
    <path d="m 15 98 c -2.769531 0 -5 2.675781 -5 6 v 2 c 0 -3.324219 2.230469 -6 5 -6 h 20 c 2.769531 0 5 2.675781 5 6 v -2 c 0 -3.324219 -2.230469 -6 -5 -6 z m 0 0" fill-opacity="0.078431"/>
  </g>
</svg>
