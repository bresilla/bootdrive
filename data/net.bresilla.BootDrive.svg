<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- BootDrive app icon: a phone whose screen shows the USB trident.
       Dimensional GNOME style: light from above, gradient body, glossy screen. -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#75727f"/>
      <stop offset="1" stop-color="#2b2838"/>
    </linearGradient>
    <linearGradient id="screen" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#4a90e8"/>
      <stop offset="1" stop-color="#7a3fb0"/>
    </linearGradient>
  </defs>

  <!-- phone: dark bevel + gradient face (wide body filling the canvas) -->
  <rect x="22" y="17" width="84" height="96" rx="16" fill="#17151f"/>
  <rect x="22" y="14" width="84" height="96" rx="16" fill="url(#body)"/>
  <!-- screen -->
  <rect x="29" y="23" width="70" height="78" rx="9" fill="url(#screen)"/>
  <!-- screen gloss + home indicator -->
  <rect x="34" y="27" width="58" height="9" rx="4.5" fill="#ffffff" opacity="0.14"/>
  <rect x="54" y="104" width="20" height="3.5" rx="1.75" fill="#ffffff" opacity="0.35"/>

  <!-- USB trident on the screen -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="64" y1="42" x2="64" y2="84"/>
    <line x1="64" y1="60" x2="50" y2="49"/>
    <line x1="64" y1="68" x2="78" y2="57"/>
  </g>
  <path d="M64 34 l-7 9 h14 z" fill="#ffffff"/>
  <circle cx="64" cy="86" r="5.5" fill="#ffffff"/>
  <circle cx="47.5" cy="46.5" r="5" fill="#ffffff"/>
  <rect x="74.5" y="52.5" width="8" height="8" rx="1" fill="#ffffff"/>
</svg>
