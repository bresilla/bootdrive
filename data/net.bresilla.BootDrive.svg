<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- BootDrive app icon: a phone whose screen shows the USB trident — the
       phone becomes a USB drive. Dimensional GNOME style: light from above,
       gradient body, glossy screen. -->
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#75727f"/>
      <stop offset="1" stop-color="#2b2838"/>
    </linearGradient>
    <linearGradient id="screen" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#4a90e8"/>
      <stop offset="1" stop-color="#7a3fb0"/>
    </linearGradient>
  </defs>

  <!-- phone: dark bevel + gradient face -->
  <rect x="37" y="11" width="54" height="112" rx="17" fill="#17151f"/>
  <rect x="37" y="8" width="54" height="110" rx="17" fill="url(#body)"/>
  <!-- screen -->
  <rect x="43" y="16" width="42" height="90" rx="8" fill="url(#screen)"/>
  <!-- screen gloss + home indicator -->
  <rect x="47" y="20" width="34" height="9" rx="4.5" fill="#ffffff" opacity="0.14"/>
  <rect x="56" y="110" width="16" height="3" rx="1.5" fill="#ffffff" opacity="0.35"/>

  <!-- USB trident on the screen -->
  <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="64" y1="40" x2="64" y2="82"/>
    <line x1="64" y1="58" x2="53" y2="48"/>
    <line x1="64" y1="66" x2="75" y2="56"/>
  </g>
  <path d="M64 33 l-6 8 h12 z" fill="#ffffff"/>
  <circle cx="64" cy="84" r="5" fill="#ffffff"/>
  <circle cx="51" cy="46" r="4.5" fill="#ffffff"/>
  <rect x="71.5" y="51.5" width="7.5" height="7.5" rx="1" fill="#ffffff"/>
</svg>
