# Flatpak manifest for the BootDrive GUI.
#
# Only the GUI is shipped in the Flatpak. The privileged helper (bootdrived) is
# a separate native postmarketOS package; the Flatpak talks to it over the
# system bus and is otherwise fully sandboxed.
#
# Build offline from generated Cargo sources:
#   ./tools/update-flatpak-sources.sh   # regenerates data/cargo-sources.json
#   flatpak-builder --user --install --force-clean build-flatpak \
#       data/net.bresilla.BootDrive.yml
app-id: net.bresilla.BootDrive
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: bootdrive-gui

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # No host filesystem access: images are picked through the file chooser
  # portal and copied into the app's own data dir. usb-signaller (root) reads
  # that copy at ~/.var/app/net.bresilla.BootDrive/data/, a real path it can
  # open, so it never needs the portal mount. (Same model as Impression, which
  # reads via the portal and drives UDisks2 over the system bus.)
  - --system-talk-name=com.meego.usb_moded
  # Downloading install images from the Download tab.
  - --share=network

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/bootdrive/cargo

modules:
  - name: bootdrive
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --package bootdrive-gui
      - install -Dm755 target/release/bootdrive-gui /app/bin/bootdrive-gui
      - install -Dm644 data/net.bresilla.BootDrive.desktop
        /app/share/applications/net.bresilla.BootDrive.desktop
      - install -Dm644 data/net.bresilla.BootDrive.metainfo.xml
        /app/share/metainfo/net.bresilla.BootDrive.metainfo.xml
      - install -Dm644 data/net.bresilla.BootDrive.svg
        /app/share/icons/hicolor/scalable/apps/net.bresilla.BootDrive.svg
      - install -Dm644 data/net.bresilla.BootDrive-symbolic.svg
        /app/share/icons/hicolor/symbolic/apps/net.bresilla.BootDrive-symbolic.svg
    sources:
      - type: dir
        path: ..
      # Generated by tools/update-flatpak-sources.sh; provides all crates and
      # the cargo config that points the offline build at them.
      - cargo-sources.json

  # osinfo-db (the libosinfo OS database) powers the Download tab. Bundled so
  # the sandbox has it at /app/share/osinfo without a network fetch at runtime.
  - name: osinfo-db
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/osinfo
      - cp -a os /app/share/osinfo/
    sources:
      - type: archive
        url: https://gitlab.com/api/v4/projects/libosinfo%2Fosinfo-db/packages/generic/release-assets/v20251212/osinfo-db-20251212.tar.xz
        sha256: 06379250c91306c98cb9726af44eae5909dfdd5449f90331e904ae1221d8d5e7
