# Flatpak manifest for the BootDrive GUI.
#
# Only the GUI is shipped in the Flatpak. The privileged helper (bootdrived) is
# a separate native postmarketOS package; the Flatpak talks to it over the
# system bus and is otherwise fully sandboxed.
#
# Build offline from generated Cargo sources:
#   ./tools/update-flatpak-sources.sh   # regenerates data/cargo-sources.json
#   flatpak-builder --user --install --force-clean build-flatpak \
#       data/net.bresilla.BootDrive.yml
app-id: net.bresilla.BootDrive
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: bootdrive-gui

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # The only host access BootDrive needs: talk to its system backend.
  - --system-talk-name=net.bresilla.BootDrive1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/bootdrive/cargo

modules:
  - name: bootdrive
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --package bootdrive-gui
      - install -Dm755 target/release/bootdrive-gui /app/bin/bootdrive-gui
      - install -Dm644 data/net.bresilla.BootDrive.desktop
        /app/share/applications/net.bresilla.BootDrive.desktop
      - install -Dm644 data/net.bresilla.BootDrive.metainfo.xml
        /app/share/metainfo/net.bresilla.BootDrive.metainfo.xml
      - install -Dm644 data/net.bresilla.BootDrive.svg
        /app/share/icons/hicolor/scalable/apps/net.bresilla.BootDrive.svg
    sources:
      - type: dir
        path: ..
      # Generated by tools/update-flatpak-sources.sh; provides all crates and
      # the cargo config that points the offline build at them.
      - cargo-sources.json
