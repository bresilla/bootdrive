<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  BootDrive drop-in for com.meego.usb_moded.

  usb-signaller's stock policy only allows sends that match specific
  (interface, member) pairs. Well-behaved clients like zbus produce messages
  that don't match those exact rules, so every call comes back AccessDenied.
  This file (loaded after usb-signaller's, so last-match-wins) simply allows any
  user to talk to the com.meego.usb_moded destination and receive its signals.

  It is not a new grant: usb-signaller already allows any user to call
  set_mode/set_config/etc. via its per-member rules. This just makes the policy
  robust to how the message is framed.

  Install: /usr/share/dbus-1/system.d/zz-bootdrive-usb-moded.conf
-->
<busconfig>
  <policy context="default">
    <allow send_destination="com.meego.usb_moded"/>
    <allow receive_sender="com.meego.usb_moded"/>
  </policy>
</busconfig>
