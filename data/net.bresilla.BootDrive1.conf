<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  System-bus policy for the BootDrive backend.

  The daemon runs as root and owns net.bresilla.BootDrive1. Only root may own
  the name. Access to the interface is restricted to members of the `bootdrive`
  group (mirrored by the daemon's own authorization check). A distributable
  build can additionally gate Activate on the PolicyKit action
  net.bresilla.bootdrive.activate.
-->
<busconfig>
  <policy user="root">
    <allow own="net.bresilla.BootDrive1"/>
    <allow send_destination="net.bresilla.BootDrive1"/>
    <allow receive_sender="net.bresilla.BootDrive1"/>
  </policy>

  <policy group="bootdrive">
    <allow send_destination="net.bresilla.BootDrive1"
           send_interface="net.bresilla.BootDrive1"/>
    <allow send_destination="net.bresilla.BootDrive1"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="net.bresilla.BootDrive1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow receive_sender="net.bresilla.BootDrive1"/>
  </policy>

  <policy context="default">
    <deny send_destination="net.bresilla.BootDrive1"/>
  </policy>
</busconfig>
