# Flathub submission manifest for BootDrive.
#
# This is the manifest that goes into the flathub/net.bresilla.BootDrive
# repository (opened via a PR against flathub/flathub). Unlike the in-tree
# dev manifest (data/net.bresilla.BootDrive.yml, which builds from a local
# dir), Flathub builds from the tagged git source below.
#
# When cutting a new release: bump `tag` + `commit`, and refresh
# cargo-sources.json next to this file if Cargo.lock changed
# (tools/update-flatpak-sources.sh).
app-id: net.bresilla.BootDrive
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: bootdrive-gui

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # No host filesystem access: images are picked through the file-chooser
  # portal and copied into the app's own data dir. The privileged helper
  # (usb-signaller) reads that copy at a real path it can open, so the app
  # itself never needs host access. Same model as Impression, which reads via
  # the portal and drives UDisks2 over the system bus.
  - --system-talk-name=com.meego.usb_moded

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/bootdrive/cargo

modules:
  - name: bootdrive
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --package bootdrive-gui
      - install -Dm755 target/release/bootdrive-gui /app/bin/bootdrive-gui
      - install -Dm644 data/net.bresilla.BootDrive.desktop
        /app/share/applications/net.bresilla.BootDrive.desktop
      - install -Dm644 data/net.bresilla.BootDrive.metainfo.xml
        /app/share/metainfo/net.bresilla.BootDrive.metainfo.xml
      - install -Dm644 data/net.bresilla.BootDrive.svg
        /app/share/icons/hicolor/scalable/apps/net.bresilla.BootDrive.svg
      - install -Dm644 data/net.bresilla.BootDrive-symbolic.svg
        /app/share/icons/hicolor/symbolic/apps/net.bresilla.BootDrive-symbolic.svg
    sources:
      - type: git
        url: https://github.com/bresilla/bootdrive.git
        tag: v0.1.0
        commit: aa91df2d411bb8739ea839e6f540bbdb6e8cc07c
      # Generated by tools/update-flatpak-sources.sh from Cargo.lock; provides
      # every crate and the cargo config that points the offline build at them.
      - cargo-sources.json
